<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

header{
    background:#111;
    color:#00bfff;
    text-align:center;
    padding:25px;
    font-size:38px;
    font-weight:bold;
    box-shadow:0 0 20px #00bfff;
}

.container{
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.card{
    width:350px;
    background:#181818;
    border-radius:18px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,191,255,.4);
}

.card h2{
    color:#00bfff;
    margin-bottom:15px;
}

.status{
    display:inline-block;
    background:#00b894;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    line-height:1.8;
    color:#ddd;
}

.preco{
    color:#00ff88;
    font-size:32px;
    font-weight:bold;
    margin:20px 0;
}

.botao{
    display:block;
    text-align:center;
    background:#00bfff;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.botao:hover{
    background:#0099dd;
}

footer{
    text-align:center;
    color:#888;
    padding:30px;
}
</style>
</head>

<body>

<header>VOID STORE</header>

<div class="container">
<div class="card">

<h2>Produto / Serviço</h2>

<div class="status">
🟢 Disponível
</div>

<div class="info">
✔ Descrição do produto ou serviço<br>
✔ Atendimento rápido<br>
✔ Suporte pelo WhatsApp
</div>

<div class="preco">
R$ 5,00
</div>

<a class="botao"
href="https://wa.me/5547997877459?text=Olá!%20Tenho%20interesse%20no%20produto.">
🛒 Comprar pelo WhatsApp
</a>

</div>
</div>

<footer>
© 2026 VOID STORE
</footer>

</body>
</html>
